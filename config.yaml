paths:
  raw_data: data/RBZL.SHF.csv
  product_data_dir: data/分产品1min主连
  product_registry: data/product_registry.json
  factor_dir: data/factors
  mid_weekly_dir: data/mid_weekly
  product_cache_dir: results/cache/products
  merged_cache: results/cache/merged_features.parquet
  cache_meta: results/cache/merged_features_meta.json
  model_dir: results/models
  training_summary: results/models/training_summary.json
  backtest_dir: results/backtest
  run_root: results/runs
  report_dir: results/reports
  regime_plot: results/reports/vol_regime_split.png
  training_plot: results/reports/training_diagnostics.png
  training_comparison_plot: results/reports/regime_model_comparison.png
  backtest_plot: results/reports/backtest_report.png
  prediction_cache: results/backtest/test_predictions.parquet

data:
  timestamp_col: TDATE
  trade_date_col: TRADE_DATE
  train_ratio: 0.70
  valid_ratio: 0.15
  test_ratio: 0.15
  target_horizon: 5
  factor_pattern: "*.csv"
  factor_include: []
  factor_exclude: []
  max_factor_missing_ratio: 0.35
  min_factor_std: 1.0e-8
  fill_method: forward_fill
  cache_merged_dataset: true
  force_rebuild_cache: false
  use_engineered_features: true
  use_mid_weekly: true
  mid_alignment: asof_forward_fill
  engineered_windows:
    short: 5
    medium: 20
    long: 60

mid_weekly:
  available_dummy: true            # emit MID_*_AVAILABLE int8 per level column
  ffill_max_bars: 8064             # cap ffill staleness (~ 4 weeks @ 5min × 48 × 7 × 4)
  derived:
    enabled: true
    rolling_windows: [4, 13, 52]   # weeks
    transforms: [ret, zscore, pct_rank]
  level_keep: true                 # keep raw MID_* level columns alongside derivatives
  missing_ratio_relax: 0.65        # applied only to MID_* cols, replaces default 0.35

batch_training:
  enforce_registry_coverage: true
  required_data_start: 2021-01-01
  required_data_end: 2025-01-01

factors:
  runtime:
    enabled: true
    windows: [5, 10, 20, 30, 60]
    lags: [0, 1, 2, 3, 4]
    groups:
      - price_lags
      - kline
      - trend
      - volatility
      - direction
      - volume
      - correlation
    cache_generated_features: true

vol_split:
  window: 20
  vol_percentage: 0.70
  label_train_only: false
  regime_label_source: daily
  split_granularity: month
  min_train_rows_per_regime: 20000

model:
  target_column: target_vol_norm
  scale_method: robust
  target_vol_window: 20
  target_vol_epsilon: 1.0e-8
  target_vol_floor_quantile: 0.05
  num_boost_round: 400
  early_stopping_rounds: 50
  feature_importance_top_n: 20
  persist_models: true
  common_params:
    objective: regression
    metric: l2
    boosting_type: gbdt
    learning_rate: 0.03
    num_leaves: 63
    max_depth: 6
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    min_child_samples: 120
    reg_alpha: 0.0
    reg_lambda: 1.0
    verbosity: -1
    n_jobs: -1
    seed: 42
  low_vol_overrides: {}
  high_vol_overrides:
    min_child_samples: 150

signal:
  signal_col: pred_return
  threshold_mode: quantile
  entry_quantile: 0.88
  exit_quantile: 0.45
  confirmation_bars: 2
  min_hold_bars: 4
  cooldown_bars: 2
  allow_direct_flip: false
  flip_to_flat_first: true
  enforce_cost_filter: true
  round_trip_turnover: 2.0
  cost_filter_multiple: 1
  min_expected_edge: 0.0

backtest:
  commission_rate: 0.0001
  slippage_rate: 0.0001
  hold_to_next_bar: true
  annualization_days: 250
  flatten_at_day_end: true
  save_prediction_table: false
