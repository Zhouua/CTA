paths:
  raw_data: data/RBZL.SHF.csv
  factor_dir: data/factors
  merged_cache: results/cache/merged_features.parquet
  cache_meta: results/cache/merged_features_meta.json
  model_dir: results/models
  training_summary: results/models/training_summary.json
  backtest_dir: results/backtest
  report_dir: results/reports
  regime_plot: results/reports/vol_regime_split.png
  training_plot: results/reports/training_diagnostics.png
  training_comparison_plot: results/reports/regime_model_comparison.png
  backtest_plot: results/reports/backtest_report.png
  prediction_cache: results/backtest/test_predictions.parquet

data:
  timestamp_col: TDATE
  trade_date_col: TRADE_DATE
  train_ratio: 0.70
  valid_ratio: 0.15
  test_ratio: 0.15
  target_horizon: 5
  factor_pattern: "*.csv"
  factor_include: []
  factor_exclude: []
  max_factor_missing_ratio: 0.35
  min_factor_std: 1.0e-8
  fill_method: forward_fill
  cache_merged_dataset: true
  force_rebuild_cache: false
  use_engineered_features: true
  engineered_windows:
    short: 5
    medium: 20
    long: 60

vol_split:
  window: 20
  vol_percentage: 0.70
  label_train_only: false
  regime_label_source: daily
  split_granularity: month
  min_train_rows_per_regime: 20000

model:
  target_column: target_vol_norm
  scale_method: robust
  target_vol_window: 20
  target_vol_epsilon: 1.0e-8
  target_vol_floor_quantile: 0.05
  num_boost_round: 400
  early_stopping_rounds: 50
  feature_importance_top_n: 20
  common_params:
    objective: regression
    metric: l2
    boosting_type: gbdt
    learning_rate: 0.03
    num_leaves: 63
    max_depth: 6
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    min_child_samples: 120
    reg_alpha: 0.0
    reg_lambda: 1.0
    verbosity: -1
    n_jobs: -1
    seed: 42
  low_vol_overrides: {}
  high_vol_overrides:
    min_child_samples: 150

signal:
  signal_col: pred_return
  threshold_mode: quantile
  entry_quantile: 0.88
  exit_quantile: 0.45
  confirmation_bars: 2
  min_hold_bars: 4
  cooldown_bars: 2
  allow_direct_flip: false
  flip_to_flat_first: true
  enforce_cost_filter: true
  round_trip_turnover: 2.0
  cost_filter_multiple: 1
  min_expected_edge: 0.0

backtest:
  commission_rate: 0.0001
  slippage_rate: 0.0001
  hold_to_next_bar: true
  annualization_days: 250
  flatten_at_day_end: true
  save_prediction_table: false
